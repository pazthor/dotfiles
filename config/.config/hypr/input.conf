# Hyprland input configuration
# US International (AltGr), Caps as Control, Left Ctrl as Compose
input {
  kb_layout = us
  kb_variant = altgr-intl
  kb_options = ctrl:nocaps,compose:rctrl

  # Keyboard repeat settings
  repeat_rate = 40
  repeat_delay = 600

  touchpad {
    # Scrolling speed multiplier
    scroll_factor = 0.4
  }
}

# Faster touchpad scroll inside Alacritty

# Optional: enable layout switch via Left Alt + Right Alt
# Add to kb_options if desired: grp:alts_toggle

# Enable touchpad gestures for changing workspaces
# See https://wiki.hyprland.org/Configuring/Gestures/
gesture = 4, horizontal, workspace
