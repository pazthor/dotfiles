# Control your input devices
# See https://wiki.hypr.land/Configuring/Variables/#input
input {
  # Use multiple keyboard layouts and switch between them with Left Alt + Right Alt
  # kb_layout = us,dk,eu
  kb_layout = us,latam
  kb_variant = altgr-intl
  kb_options = ctrl:nocaps,compose:lctrl  # ,grp:alts_toggle

  # Change speed of keyboard repeat
  repeat_rate = 40
  repeat_delay = 600

  # Start with numlock on by default
  numlock_by_default = true

  # Increase sensitivity for mouse/trackpad (default: 0)
  # sensitivity = 0.35

  # Enable cursor-based monitor/window focus
  follow_mouse = 1  # 1=always follow, 2=floating only, 3=no focus stealing

  touchpad {
    # Use natural (inverse) scrolling
    # natural_scroll = true

    # Use two-finger clicks for right-click instead of lower-right corner
    # clickfinger_behavior = true

    # Control the speed of your scrolling
    scroll_factor = 0.4

    # Enable the touchpad while typing
    # disable_while_typing = false

    # Left-click-and-drag with three fingers
    # drag_3fg = 1
  }
}

# Scroll nicely in the terminal
windowrule = match:class (Alacritty|kitty), scroll_touchpad 1.5
windowrule = match:class com.mitchellh.ghostty, scroll_touchpad 0.2

# Enable touchpad gestures for changing workspaces
# See https://wiki.hyprland.org/Configuring/Gestures/
gesture = 4, horizontal, workspace

# Volume on 3-finger vertical swipe (one step per swipe, shows OSD)
gesture = 3, up, dispatcher, exec, omarchy-swayosd-client --output-volume raise
gesture = 3, down, dispatcher, exec, omarchy-swayosd-client --output-volume lower

# Brightness on 4-finger vertical swipe (one step per swipe, shows OSD)
gesture = 4, up, dispatcher, exec, omarchy-brightness-display +5%
gesture = 4, down, dispatcher, exec, omarchy-brightness-display 5%-

# Play/pause on 3-finger pinch in
gesture = 3, pinchin, dispatcher, exec, omarchy-swayosd-client --playerctl play-pause
