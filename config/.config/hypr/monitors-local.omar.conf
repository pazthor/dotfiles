# Omar/new high-DPI laptop monitor overrides.
# External ultrawide HDMI-A-1 above, 2880x1800 laptop centered below.
# HDMI-A-1 scale 1.6 -> logical 2150x900; eDP scale 1.5 -> logical 1920x1200.
#
# Copy to activate:
#   cp ~/.config/hypr/monitors-local.omar.conf ~/.config/hypr/monitors-local.conf
#
# If the laptop reports a different refresh rate, run `hyprctl monitors` and
# replace 120 with the exact available eDP-1 refresh rate.

monitor=eDP-1,2880x1800@120,115x900,1.5,vrr,0
