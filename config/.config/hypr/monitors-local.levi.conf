# Levi monitor overrides.
# External ultrawide HDMI-A-1 above, 1920x1080 laptop centered below.
# HDMI-A-1 scale 1.6 -> logical 2150x900; eDP scale 1.5 -> logical 1280x720.
#
# Copy to activate:
#   cp ~/.config/hypr/monitors-local.levi.conf ~/.config/hypr/monitors-local.conf

monitor=eDP-1,1920x1080@60,435x900,1.5,vrr,0
