# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows
    # gaps_in = 0
    # gaps_out = 0

    layout = scrolling
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    rounding = 8
}

# https://wiki.hypr.land/Configuring/Scrolling-Layout/
scrolling {
    column_width = 0.8
}

# XWayland scaling fix - prevents blur when moving between monitors with different scaling
# Force XWayland apps to render at native resolution, then let Hyprland handle scaling
# This fixes blurry apps (like zen-browser) when switching between 2.5x and 2.0x monitors
# https://wiki.hyprland.org/Configuring/XWayland/
xwayland {
    force_zero_scaling = true
}

