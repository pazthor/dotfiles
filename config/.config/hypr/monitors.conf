# Hand-maintained. The hyprdynamicmonitors generator is NOT installed on this
# machine, so this file is the single source of truth and is not regenerated.
#
# Laptop OLED (eDP-1, ATNA60CL10) at its native mode 2880x1800@120.
# scale 1.5 -> logical 1920x1200. Adjust live with the scaling-cycle keybind.
monitor=eDP-1,2880x1800@120,0x0,1.5,vrr,0

# VITURE Luma Ultra XR glasses. Matched by description so it survives DP-#
# renumbering. 1920x1200@120; scale 1.6 -> logical 1200x750 for readable text
# (astigmatism). NB: 1.55 was requested but isn't a valid fractional scale here
# (1920/1.55 isn't a whole pixel), so Hyprland snaps it to 1.6; 1.5 -> 1280x800
# is the next valid step for smaller text / more space. Explicit position
# 1920x0 = right of the laptop (eDP-1 is 1920 logical wide); auto-right won't
# work because eDP-1 has an explicit position, so directional-auto has no
# anchor. Delete this line to fall back to the catch-all below.
monitor=desc:CVT VITURE 0x88888800,1920x1200@120,1920x0,1.6

# Any other external display: use its preferred mode, auto-placed. The explicit
# rules above take precedence over this catch-all.
monitor=,preferred,auto,auto

# Workspaces use Hyprland's native per-monitor behaviour (see hyprland.conf).
# Keep monitor geometry here only.

# Enable cursor-based monitor/window focus
input {
    follow_mouse = 1  # 1=always follow, 2=floating only, 3=no focus stealing
}
