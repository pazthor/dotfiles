# External ultrawide — top position.
monitor=HDMI-A-1,3440x1440@60,0x0,1.67,vrr,0

# Laptop screen — preferred picks the right native res on each machine.
# Position is overridden per-machine in monitors-local.conf.
monitor=eDP-1,preferred,auto-down,1.5,vrr,0

# VITURE Luma Ultra XR glasses. Matched by description so it survives DP-#
# renumbering. 1920x1200@120; scale 1.6 -> logical 1200x750 for readable text
# (astigmatism). NB: 1.55 was requested but isn't a valid fractional scale here
# (1920/1.55 isn't a whole pixel), so Hyprland snaps it to 1.6; 1.5 -> 1280x800
# is the next valid step for smaller text / more space. Explicit position
# 1920x0 = right of the default laptop layout; override per-machine in
# monitors-local.conf when using the glasses with another display layout.
monitor=desc:CVT VITURE 0x88888800,1920x1200@120,1920x0,1.6

# Catch-all: any other display (projector, dock, etc.) auto-placed.
# The explicit rules above take precedence over this catch-all.
monitor=,preferred,auto,auto

# Machine-specific overrides (not tracked in repo — create on each machine).
# See docs/monitor-setup.md for instructions and X offset values.
source = ~/.config/hypr/monitors-local.conf

# Workspaces use Hyprland's native per-monitor behaviour (see hyprland.conf).
# Keep monitor geometry here only.

# Enable cursor-based monitor/window focus
input {
    follow_mouse = 1  # 1=always follow, 2=floating only, 3=no focus stealing
}
