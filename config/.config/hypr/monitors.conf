# Hand-maintained. The hyprdynamicmonitors generator is NOT installed on this
# machine, so this file is the single source of truth and is not regenerated.
#
# Laptop OLED (eDP-1, ATNA60CL10) at its native mode 2880x1800@120.
# scale 1.5 -> logical 1920x1200. Adjust live with the scaling-cycle keybind.
monitor=eDP-1,2880x1800@120,0x0,1.5,vrr,0

# Any external display / VR glasses: use its preferred mode, auto-placed.
# The explicit eDP-1 rule above takes precedence over this catch-all.
monitor=,preferred,auto,auto

# Workspaces use Hyprland's native per-monitor behaviour (see hyprland.conf).
# Keep monitor geometry here only.

# Enable cursor-based monitor/window focus
input {
    follow_mouse = 1  # 1=always follow, 2=floating only, 3=no focus stealing
}
